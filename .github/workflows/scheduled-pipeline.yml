name: scheduled-pipeline

# Free scheduled runs on GitHub Actions:
#   - daily 12:30 UTC (7:30am ET / 4:30am PT) → advance outreach sequences
#   - weekly Sunday 06:00 UTC               → full universe rebuild
#
# Add repository secrets (Settings → Secrets and variables → Actions):
#   GOOGLE_MAPS_API_KEY, HUNTER_IO_API_KEY, APOLLO_API_KEY, PROXYCURL_API_KEY,
#   REGRID_API_KEY, REPORTALL_API_KEY, ATTOM_API_KEY,
#   CENSUS_API_KEY, AIRTABLE_API_KEY, AIRTABLE_BASE_ID, NOTION_API_KEY,
#   LOB_API_KEY, ALERT_EMAIL_TO, ALERT_EMAIL_FROM, SMTP_*, SLACK_WEBHOOK_URL,
#   SENDER_NAME, SENDER_EMAIL, SENDER_PHONE, SENDER_FIRM
#
# State (output dir + SQLite CRM) is uploaded as an artifact on each run so
# you can download and inspect locally. For real persistence between runs,
# point DATABASE_URL at a Postgres add-on or commit state to a private branch.

on:
  schedule:
    - cron: '30 12 * * *'   # daily sequence advance
    - cron: '0 6 * * 0'     # weekly full rebuild
  workflow_dispatch:        # manual trigger from the Actions tab
    inputs:
      run_mode:
        description: 'full | sequence'
        required: false
        default: 'sequence'
      target_states:
        description: 'Comma-separated state codes'
        required: false
        default: 'FL,TX,CA,NY,GA'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (only on weekly full run)
        if: github.event.schedule == '0 6 * * 0' || github.event.inputs.run_mode == 'full'
        run: playwright install --with-deps chromium

      - name: Determine RUN_MODE
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 6 * * 0" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.run_mode }}" ]; then
            echo "mode=${{ github.event.inputs.run_mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=sequence" >> $GITHUB_OUTPUT
          fi

      - name: Restore previous run state
        uses: actions/cache@v4
        with:
          path: |
            data/output
            data/cache
          key: pipeline-state-${{ github.run_id }}
          restore-keys: |
            pipeline-state-

      - name: Run scraper
        env:
          RUN_MODE: ${{ steps.mode.outputs.mode }}
          TARGET_STATES: ${{ github.event.inputs.target_states || 'FL,TX,CA,NY,GA' }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          HUNTER_IO_API_KEY:   ${{ secrets.HUNTER_IO_API_KEY }}
          APOLLO_API_KEY:      ${{ secrets.APOLLO_API_KEY }}
          PROXYCURL_API_KEY:   ${{ secrets.PROXYCURL_API_KEY }}
          REGRID_API_KEY:      ${{ secrets.REGRID_API_KEY }}
          REPORTALL_API_KEY:   ${{ secrets.REPORTALL_API_KEY }}
          ATTOM_API_KEY:       ${{ secrets.ATTOM_API_KEY }}
          CENSUS_API_KEY:      ${{ secrets.CENSUS_API_KEY }}
          AIRTABLE_API_KEY:    ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID:    ${{ secrets.AIRTABLE_BASE_ID }}
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_LEADS: ${{ secrets.NOTION_DATABASE_LEADS }}
          SYNC_AIRTABLE: '1'
          # Sender block (used by outreach templates)
          SENDER_NAME:  ${{ secrets.SENDER_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PHONE: ${{ secrets.SENDER_PHONE }}
          SENDER_FIRM:  ${{ secrets.SENDER_FIRM }}
          # Alerts on failure
          ALERT_EMAIL_TO:   ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME:    ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main_scraper.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ steps.mode.outputs.mode }}-${{ github.run_id }}
          path: |
            data/output/*.xlsx
            data/output/*.csv
            data/output/*.sqlite
            data/output/*.md
            data/output/*.html
            data/output/logs/
          retention-days: 30
